<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Security Scan Follow-up Plan Hub</title>
    
    <script>
      if ('serviceWorker' in navigator) {
        const workerScript = `
          self.addEventListener('install', () => self.skipWaiting());
          self.addEventListener('activate', event => event.waitUntil(self.clients.claim()));
          self.addEventListener('fetch', event => {
            if (event.request.cache === 'only-if-cached' && event.request.mode !== 'same-origin') return;
            event.respondWith(
              fetch(event.request).then(response => {
                if (response.status === 0) return response;
                const newHeaders = new Headers(response.headers);
                newHeaders.set('Cross-Origin-Opener-Policy', 'same-origin');
                newHeaders.set('Cross-Origin-Embedder-Policy', 'require-corp');
                return new Response(response.body, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: newHeaders
                });
              }).catch(e => fetch(event.request))
            );
          });
        `;
        const blob = new Blob([workerScript], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(blob);
        
        navigator.serviceWorker.register(workerUrl).then((reg) => {
          if (reg.active && !window.crossOriginIsolated) {
            window.location.reload();
          }
        }).catch(err => console.error("Sandbox failure:", err));
      }
    </script>

    <link rel="stylesheet" href="https://unpkg.com/@stlite/mountable@0.58.0/build/stlite.css" />
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/@stlite/mountable@0.58.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas", "openpyxl", "beautifulsoup4"], 
        entrypoint: "app.py",
        files: {
          "app.py": {
            url: "app.py",
          },
        },
      }, document.getElementById("root"));
    </script>
  </body>
</html>
