def parse_version_string(v_str):
    v_str = str(v_str).strip()
    months = {
        "january": 1, "february": 2, "march": 3, "april": 4, "may": 5, "june": 6, 
        "july": 7, "august": 8, "september": 9, "october": 10, "november": 11, "december": 12
    }
    
    date_match = re.search(r'\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+(\\d{4})\\b', v_str, re.IGNORECASE)
    if date_match:
        m_name, year_val = date_match.groups()
        return (int(year_val), months.get(m_name.lower(), 0), 0, '')
        
    match = re.match(r'^(\\d+(?:\\.\\d+)*)([a-z]*)$', v_str, re.IGNORECASE)
    if match:
        nums_str, letters = match.groups()
        nums = tuple(int(x) for x in nums_str.split('.'))
        letters = letters.lower()
        return (0, 0, nums, letters)
    return (0, 0, (), '')

def get_vulnerability_family_and_version(name_str):
    name_str = str(name_str).strip()
    
    # --- STAGE 1: EXPLICIT .NET CORE CHECK ---
    # Catch .NET Core specific naming trees and attach chronological/version metadata
    if '.net core' in name_str.lower():
        family = "Microsoft .NET Core Runtime and SDK Family [VERSION]"
        
        # Check if it specifies the .NET 8 upgrade line
        is_net_8 = '8.0' in name_str or '.net 8' in name_str.lower()
        
        # Try parsing the text date tokens (e.g., 'January 2025' or 'July 2024')
        date_tokens = re.findall(r'\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+\\d{4}\\b', name_str, re.IGNORECASE)
        
        if date_tokens:
            parsed_date = parse_version_string(date_tokens[0]) # Returns (Year, Month, 0, '')
            # Tuple shape: (Is_Net_8_Flag, Year, Month)
            # This structures sorting so that .NET 8 flags group up natively but preserve real dates
            max_version = (1 if is_net_8 else 0, parsed_date[0], parsed_date[1], 'net_core_item')
            return family, max_version
            
    # --- STAGE 2: STANDARD CLASSIFICATION ROUTINE ---
    if '<' in name_str:
        family = name_str.split('<')[0].strip()
    elif '<=' in name_str:
        family = name_str.split('<=')[0].strip()
    else:
        date_pattern = r'\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+(\\d{4})\\b'
        if re.search(date_pattern, name_str, re.IGNORECASE):
            family = re.sub(date_pattern, "[VERSION]", name_str, flags=re.IGNORECASE)
        else:
            tokens = re.findall(r'\\b\\d+(?:\\.\\d+)+[a-z]*\\b', name_str, re.IGNORECASE)
            family = name_str
            for t in tokens:
                family = family.replace(t, "[VERSION]")
                
    all_tokens = re.findall(r'\\b\\d+(?:\\.\\d+)+[a-z]*\\b', name_str, re.IGNORECASE)
    date_tokens = re.findall(r'\\b(january|february|march|april|may|june|july|august|september|october|november|december)\\s+\\d{4}\\b', name_str, re.IGNORECASE)
    
    if date_tokens:
        max_version = parse_version_string(date_tokens[0])
    elif all_tokens:
        max_token = max(all_tokens, key=parse_version_string)
        max_version = parse_version_string(max_token)
    else:
        max_version = (0, 0, (), '')
        
    return family, max_version

def parse_zap_html(file_bytes):
    html_text = file_bytes.decode('utf-8', errors='ignore')
    soup = BeautifulSoup(html_text, 'html.parser')
    zap_rows = []
    risk_groups = soup.find_all('li', id=lambda x: x and 'risk-' in x and 'confidence-' in x)
    for r_group in risk_groups:
        id_str = r_group.get('id', '')
        match = re.search(r'risk-(\\d)-confidence-(\\d)', id_str)
        if not match:
            continue
        risk_num = int(match.group(1))
        if risk_num <= 1:
            continue
        risk_map = {3: "High", 2: "Medium"}
        conf_map = {3: "High", 2: "Medium", 1: "Low"}
        risk_val = risk_map.get(risk_num, "Medium")
        conf_val = conf_map.get(int(match.group(2)), "Low")
        h5_elements = r_group.find_all('h5')
        for h5 in h5_elements:
            alert_title = h5.get_text().strip()
            alert_title = re.sub(r'\\s*\\(\\d+\\)\\s*$', '', alert_title)
            parent_li = h5.find_parent('li')
            if not parent_li:
                continue
            tables = parent_li.find_all('table', class_='alerts-table')
            for table in tables:
                row_data = {
                    "Source_Type": "ZAP", "Risk": risk_val, "Confidence_Str": conf_val,
                    "Host": "GET https://localhost", "Protocol": "Nil", "Port": "Nil",
                    "Name": alert_title, "Synopsis": "", "Solution": "", "See Also": "", "Output": ""
                }
                details_container = table.find_parent('details')
                if details_container:
                    summary_elem = details_container.find('summary')
                    if summary_elem:
                        url_span = summary_elem.find('span', class_='request-method-n-url')
                        if url_span:
                            row_data["Host"] = url_span.get_text().strip()
                        else:
                            row_data["Host"] = summary_elem.get_text().strip()
                tr_elements = table.find_all('tr')
                for tr in tr_elements:
                    th = tr.find('th')
                    td = tr.find('td')
                    if not th or not td:
                        continue
                    label = th.get_text().strip().lower()
                    if 'description' in label:
                        row_data["Synopsis"] = td.get_text().strip()
                    elif 'solution' in label:
                        row_data["Solution"] = td.get_text().strip()
                    elif 'reference' in label:
                        links = [a['href'] for a in td.find_all('a', href=True)]
                        row_data["See Also"] = "\\n".join(links)
                    elif 'response' in label:
                        pre_tag = td.find('pre')
                        if pre_tag:
                            row_data["Output"] = pre_tag.get_text().strip()
                        else:
                            row_data["Output"] = td.get_text().strip()
                if row_data["Host"] and row_data["Risk"]:
                    zap_rows.append(row_data)
    return pd.DataFrame(zap_rows)

with col1:

with col2:
    st.subheader("OWASP ZAP Data (Medium & High Only)")
    uploaded_zap = st.file_uploader("Upload OWASP ZAP HTML reports", type=["html"], accept_multiple_files=True, key="zap_input")
    if uploaded_zap:
        new_zap = False
        for f in uploaded_zap:
            if f.name not in st.session_state["logged_zap_files"]:
                try:
                    file_bytes = f.read()
                    temp_df = parse_zap_html(file_bytes)
                    headers = ["Source_Type", "Risk", "Host", "Protocol", "Port", "Name", "Synopsis", "Solution", "See Also", "Confidence_Str", "Output"]
                    for h in headers:
                        if h not in temp_df.columns:
                            temp_df[h] = ""
                    st.session_state["zap_dataset"] = pd.concat([st.session_state["zap_dataset"], temp_df[headers]], ignore_index=True)
                    st.session_state["logged_zap_files"].add(f.name)

                except Exception as e:

        if new_zap:

has_nessus = len(st.session_state["logged_nessus_files"]) > 0
has_zap = len(st.session_state["logged_zap_files"]) > 0

if not has_nessus and not has_zap:
    st.info("Awaiting file context inputs. Please populate target fields above.")
else:
    st.sidebar.markdown("---")
    st.sidebar.markdown("**Loaded Inventories:**")
    if has_nessus:
        st.sidebar.caption(f"Nessus CSVs ({len(st.session_state['logged_nessus_files'])} files)")
    if has_zap:
        st.sidebar.caption(f"ZAP HTMLs ({len(st.session_state['logged_zap_files'])} files)")

    nessus_df = st.session_state["nessus_dataset"].copy()
    zap_df = st.session_state["zap_dataset"].copy()
    raw_vulnerabilities = []
    
    # --- Parse Nessus Context ---
    if not nessus_df.empty:
        for field in ["See Also", "Synopsis", "Solution", "Output", "Name", "Host"]:
            nessus_df[field] = nessus_df[field].fillna("").astype(str).str.strip()
        nessus_df = nessus_df.dropna(subset=["Risk", "Host", "Name"])
        nessus_df = nessus_df[~nessus_df["Name"].str.contains(r"certificate", case=False, na=False)]
        nessus_df = nessus_df[~nessus_df["Name"].str.contains(r"icmp.*timestamp", case=False, na=False)]
        nessus_df["Risk_Cleaned"] = nessus_df["Risk"].astype(str).str.strip()
        nessus_df = nessus_df[~nessus_df["Risk_Cleaned"].str.lower().isin(["none", "informational", "0", "nan", ""])]
        
        if not nessus_df.empty:
            nessus_df["Family"], nessus_df["Ver_Tuple"] = zip(*nessus_df["Name"].apply(get_vulnerability_family_and_version))
            
            # --- CUSTOM RE-SORTING LAYER FOR STRICT .NET CORE UPGRADE LOGIC ---
            # Sorts by asset pathways, then by family. For .NET Core, items with the .NET 8 flag
            # are grouped; sorting by year and month descending puts the absolute newest items on top.
            nessus_df["Sort_Is_NetCore"] = nessus_df["Ver_Tuple"].apply(lambda x: 1 if (isinstance(x, tuple) and len(x) == 4 and x[3] == 'net_core_item') else 0)
            
            # Primary structural sort
            nessus_df = nessus_df.sort_values(
                by=["Host", "Protocol", "Port", "Family", "Sort_Is_NetCore", "Ver_Tuple"], 
                ascending=[True, True, True, True, True, False]
            )
            
            # Drop entries where the family matches, but apply a smart conditional evaluation block for .NET Core
            deduped_rows = []
            seen_families = {}
            
            for idx, row in nessus_df.iterrows():
                asset_key = f"{row['Host']}_{row['Protocol']}_{row['Port']}"
                family_key = f"{asset_key}_{row['Family']}"
                
                if family_key not in seen_families:
                    seen_families[family_key] = row["Ver_Tuple"]
                    deduped_rows.append(row)
                else:
                    # If this is a .NET Core family match, check if the already stored record is .NET 8 with a newer date
                    existing_tuple = seen_families[family_key]
                    current_tuple = row["Ver_Tuple"]
                    
                    if (isinstance(existing_tuple, tuple) and len(existing_tuple) == 4 and existing_tuple[3] == 'net_core_item'):
                        # If the top item is .NET 8 (flag == 1) and its date is newer or equal, drop this older generic item
                        # (Since it's sorted descending by date, the top item is already the newest)
                        if existing_tuple[0] == 1 and (existing_tuple[1], existing_tuple[2]) >= (current_tuple[1], current_tuple[2]):
                            continue
                        else:
                            deduped_rows.append(row)
                    else:
                        continue
                        
            deduped_nessus = pd.DataFrame(deduped_rows)
            
            if not deduped_nessus.empty:
                for _, row in deduped_nessus.iterrows():
                    r_lower = str(row["Risk_Cleaned"]).lower()
                    if 'critical' in r_lower:
                        impact, likelihood = 3, 2
                    elif 'high' in r_lower:
                        impact, likelihood = 2, 2
                    elif 'medium' in r_lower:
                        impact, likelihood = 2, 1
                    else:
                        impact, likelihood = 1, 1
                        
                    raw_vulnerabilities.append({
                        "Source": "Nessus", "Host": row["Host"], "Protocol": row["Protocol"], "Port": row["Port"],
                        "Family": row["Family"], "Name": row["Name"], "Synopsis": row["Synopsis"], "Solution": row["Solution"],
                        "Impact": impact, "Likelihood": likelihood, "Output": row["Output"], "Reference": row["See Also"]
                    })
                
    # --- Parse ZAP Context ---
    if not zap_df.empty:
        for field in ["See Also", "Synopsis", "Solution", "Output", "Name", "Host", "Risk"]:
            zap_df[field] = zap_df[field].fillna("").astype(str).str.strip()
        zap_df = zap_df.dropna(subset=["Risk", "Host", "Name"])
        zap_df = zap_df[~zap_df["Name"].str.contains(r"certificate", case=False, na=False)]
        zap_df = zap_df[~zap_df["Name"].str.contains(r"icmp.*timestamp", case=False, na=False)]
        zap_df = zap_df[~zap_df["Risk"].str.lower().isin(["low", "none", "informational", "0", "nan", ""])]
        
        for _, row in zap_df.iterrows():
            r_lower = str(row["Risk"]).lower()
            conf_str = str(row["Confidence_Str"]).lower()

                impact = 3
            elif 'high' in r_lower or 'medium' in r_lower:
                impact = 2
            else:
                impact = 1

                "Family": row["Name"], "Name": row["Name"], "Synopsis": row["Synopsis"], "Solution": row["Solution"],
                "Impact": impact, "Likelihood": likelihood, "Output": row["Output"], "Reference": row["See Also"]
            })

    if not raw_vulnerabilities:
        st.warning("No actionable vulnerabilities remaining after applying structural exclusions.")
    else:
        # --- MULTI-SOCKET CONSOLIDATION ROUTINE ---
        df_all = pd.DataFrame(raw_vulnerabilities)
        processed_tracks = []
        
        grouped = df_all.groupby(["Source", "Family", "Synopsis", "Solution", "Impact", "Likelihood", "Reference"], dropna=False)
        for (source, family, synopsis, solution, impact, likelihood, reference), group in grouped:
            unique_sockets = group.drop_duplicates(subset=["Host", "Protocol", "Port"])
            is_singular = len(unique_sockets) == 1
            
            if is_singular:
                first_item = unique_sockets.iloc[0]
                asset_id_val = str(first_item["Host"])
                protocol_val = str(first_item["Protocol"])
                port_val = str(first_item["Port"])
            else:
                socket_strings = []
                for _, socket_row in unique_sockets.sort_values(by=["Host", "Port"]).iterrows():
                    socket_strings.append(f"{socket_row['Host']} tcp {socket_row['Port']}")
                asset_id_val = "\\n".join(socket_strings)
                protocol_val = "Nil"
                port_val = "Nil"
                
            outputs_combined = "\\n".join([out for out in group["Output"].unique() if out])
            name_val = group.iloc[0]["Name"]
            
            processed_tracks.append({
                "Source": source, "System/Asset ID": asset_id_val, "Protocol": protocol_val, "Port": port_val,
                "Security Domain Area": "Operation Security", "Risk Name/Observation": name_val,
                "Vulnerability\\n/Threat": synopsis, "Action plan": solution,
                "Impact": impact, "Likelihood": likelihood, "Output": outputs_combined, "Reference": reference
            })
            
        # Compile numeric risk ratings across items
        for r in processed_tracks:
            r["Risk Rating"] = r["Impact"] * r["Likelihood"] * systems_tier
            if r["Risk Rating"] == 1:
                r["Risk Rating/ Level"] = "AOI"
            elif r["Risk Rating"] <= 9:
                r["Risk Rating/ Level"] = "Low"
            elif r["Risk Rating"] <= 18:
                r["Risk Rating/ Level"] = "Medium"
            else:
                r["Risk Rating/ Level"] = "High"
                
        nessus_final = [r for r in processed_tracks if r["Source"] == "Nessus"]
        zap_final = [r for r in processed_tracks if r["Source"] == "ZAP"]
        nessus_final.sort(key=lambda x: x["Risk Rating"], reverse=True)
        zap_final.sort(key=lambda x: x["Risk Rating"], reverse=True)

        excel_buffer = io.BytesIO()

            'Risk Treatment method (Acceptance / Reduction / Avoidance / Transfer)', 
            'Security Domain Area', 'Risk Name/Observation', 'Vulnerability\\n/Threat',

            'Systems Tier', 'Risk Rating', 'Target completion date\\n(dd/mm/yyyy)', 
            'Status', 'Details of follow-up actions', 'Acutal Completion date\\n(dd/mm/yyyy)', 
            'Reference', 'Output'
        ]
        
        for c_idx, title_text in enumerate(headers_blueprint, start=3):
            ws.cell(row=3, column=c_idx, value=title_text)
            
        total_rows_count = len(nessus_final) + len(zap_final)
        ws.auto_filter.ref = f"C3:V{total_rows_count + 3}"
        current_write_row = 4
        
        for i, r_data in enumerate(nessus_final):

            ws.cell(row=current_write_row, column=5, value=r_data["Protocol"])
            ws.cell(row=current_write_row, column=6, value=r_data["Port"])

            ws.cell(row=current_write_row, column=13, value=r_data["Impact"])

            ws.cell(row=current_write_row, column=22, value=r_data["Output"])
            current_write_row += 1
            
        for i, r_data in enumerate(zap_final):
            ws.cell(row=current_write_row, column=3, value=f"A{i + 1}")
            ws.cell(row=current_write_row, column=4, value=r_data["System/Asset ID"])
            ws.cell(row=current_write_row, column=5, value=r_data["Protocol"])
            ws.cell(row=current_write_row, column=6, value=r_data["Port"])
            ws.cell(row=current_write_row, column=8, value=r_data["Security Domain Area"])
            ws.cell(row=current_write_row, column=9, value=r_data["Risk Name/Observation"])
            ws.cell(row=current_write_row, column=10, value=r_data["Vulnerability\\n/Threat"])
            ws.cell(row=current_write_row, column=11, value=r_data["Action plan"])
            ws.cell(row=current_write_row, column=12, value=r_data["Risk Rating/ Level"])
            ws.cell(row=current_write_row, column=13, value=r_data["Impact"])
            ws.cell(row=current_write_row, column=14, value=r_data["Likelihood"])
            ws.cell(row=current_write_row, column=15, value=systems_tier)
            ws.cell(row=current_write_row, column=16, value=r_data["Risk Rating"])
            ws.cell(row=current_write_row, column=21, value=r_data["Reference"])
            ws.cell(row=current_write_row, column=22, value=r_data["Output"])
            current_write_row += 1
            
        st.success(f"Processing Complete! Compiled {total_rows_count} unique vulnerability tracks.")
        center_align = Alignment(horizontal="center", vertical="top", wrap_text=True)
        left_align = Alignment(horizontal="left", vertical="top", wrap_text=True)
        
        thin_border_side = Side(style='thin', color='000000')
        grid_border = Border(left=thin_border_side, right=thin_border_side, top=thin_border_side, bottom=thin_border_side)
        
        for row in ws.iter_rows(min_row=3, max_row=total_rows_count + 3, min_col=3, max_col=22):
            for cell in row:
                cell.border = grid_border
                if cell.column in [3, 5, 6, 8, 12, 13, 14, 15, 16]:
                    cell.alignment = center_align
                else:
                    cell.alignment = left_align
                    
        column_widths = {
            'C': 18, 'D': 32, 'E': 12, 'F': 12, 'G': 15, 'H': 18, 'I': 35, 'J': 45, 'K': 50, 
            'L': 18, 'M': 10, 'N': 10, 'O': 12, 'P': 12, 'Q': 15, 'R': 12, 'S': 20, 'T': 15, 'U': 30, 'V': 45
        }
        for col_letter, width in column_widths.items():
            ws.column_dimensions[col_letter].width = width
            
        wb.save(excel_buffer)
        st.write("---")
        st.download_button(
            label="Download Structured Excel Follow-up Plan",
            data=excel_buffer.getvalue(),
            file_name=f"Follow up Plan - {project_suffix}.xlsx",
            mime="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        )
`,
        },
      }, document.getElementById("root"));
